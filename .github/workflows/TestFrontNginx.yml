name: Deploy Frontend To Nginx Test

on:
  push:
    branches: [ "FE/test" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.5.1

      - name: Check Node v
        run: node -v

      - name: Install dependencies
        working-directory: ./front
        run: npm install

      - name: Generate build
        working-directory: ./front
        run: npm run build

      - name: Create tarball
        run: tar -czvf /tmp/ZUpGilcHdW.tar.gz -C ./front/dist .

      - name: Move tarball to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "/tmp/ZUpGilcHdW.tar.gz"
          target: "/tmp"

      - name: Extract tarball on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            tar -xzvf /tmp/ZUpGilcHdW.tar.gz -C /usr/share/nginx/html
