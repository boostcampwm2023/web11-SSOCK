name: Deploy Frontend To Nginx Test

on:
  push:
    branches: [ "FE/test" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
  
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.5.1
          
      - name: Check Node v
        run: node -v

      - name: SSH Version Check
        run: ssh -V
  
      - name: Install dependencies
        working-directory: ./front
        run: npm install
  
      - name: Generate build
        working-directory: ./front
        run: npm run build
  
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          working-directory: ./front
          script: |
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S rm -rf /usr/share/nginx/html
            echo ${{ secrets.SERVER_PASSWORD }} | sudo -S cp -r ./front/dist /usr/share/nginx/html
